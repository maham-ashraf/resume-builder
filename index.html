<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Resume Builder</title>
    <link rel="icon" type="image/png" href="resume-builder.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Editor Section -->
        <section class="editor-section hide-on-print">
            <header class="editor-header">
                <h1><img src="resume-builder.png" alt="Logo" class="app-logo"> CV Builder</h1>
                <div class="header-actions">
                    <div class="color-picker-wrapper">
                        <label for="theme-color" title="Theme Color"><i class="fas fa-palette"></i></label>
                        <input type="color" id="theme-color" value="#3b82f6" class="theme-color-input">
                    </div>
                    <button id="print-btn" class="btn btn-primary"><i class="fas fa-print"></i> Export CV</button>
                    <button id="clear-btn" class="btn btn-danger" title="Clear All Data"><i class="fas fa-trash-alt"></i></button>
                </div>
            </header>

            <form id="resume-form" class="resume-form">
                <!-- Personal Info -->
                <div class="form-section">
                    <h2><i class="fas fa-user-circle"></i> Personal Details</h2>
                    <div class="form-group profile-upload-group">
                        <label for="profileImage">Profile Photo</label>
                        <div class="upload-controls">
                            <input type="file" id="profileImage" accept="image/*" class="file-input">
                            <button type="button" id="remove-img-btn" class="btn btn-danger btn-sm" style="display:none">Remove Photo</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="e.g. Alex Johnson">
                    </div>
                    <div class="form-group">
                        <label for="jobTitle">Job Title</label>
                        <input type="text" id="jobTitle" placeholder="e.g. Frontend Developer">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="alex@example.com">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="text" id="phone" placeholder="+1 (555) 123-4567">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="address">Location</label>
                        <input type="text" id="address" placeholder="New York, NY">
                    </div>
                    <div class="form-group">
                        <label for="summary">Professional Summary</label>
                        <textarea id="summary" rows="3" placeholder="Brief overview of your professional background..."></textarea>
                    </div>
                </div>

                <!-- Skills -->
                <div class="form-section">
                    <h2><i class="fas fa-tools"></i> Skills</h2>
                    <div class="form-group">
                        <label for="skills">Skills (comma separated)</label>
                        <textarea id="skills" rows="2" placeholder="HTML, CSS, JavaScript, React..."></textarea>
                    </div>
                </div>

                <!-- Experience -->
                <div class="form-section">
                    <h2><i class="fas fa-briefcase"></i> Experience</h2>
                    <div id="experience-container"></div>
                    <button type="button" id="add-experience-btn" class="btn btn-secondary"><i class="fas fa-plus"></i> Add Experience</button>
                </div>

                <!-- Education -->
                <div class="form-section" style="margin-bottom: 50px;">
                    <h2><i class="fas fa-graduation-cap"></i> Education</h2>
                    <div id="education-container"></div>
                    <button type="button" id="add-education-btn" class="btn btn-secondary"><i class="fas fa-plus"></i> Add Education</button>
                </div>
            </form>
        </section>

        <!-- Preview Section -->
        <section class="preview-section">
            <div id="resume-preview-container">
                <div id="resume-preview" class="resume-preview template-modern">
                    <!-- Content injected via JS -->
                </div>
            </div>
        </section>
    </div>

    <!-- Templates for Dynamic Form Entries -->
    <template id="experience-form-template">
        <div class="dynamic-entry" data-type="experience">
            <div class="entry-header">
                <h3>Work Experience</h3>
                <button type="button" class="icon-btn remove-entry-btn" title="Remove"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" class="exp-title" placeholder="e.g. UI Designer">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" class="exp-company" placeholder="e.g. Creative Agency">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="text" class="exp-start" placeholder="e.g. Jan 2020">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="text" class="exp-end" placeholder="e.g. Present">
                </div>
            </div>
            <div class="form-group">
                <label>Description (Use '-' for bullet points)</label>
                <textarea class="exp-desc" rows="4" placeholder="- Designed beautiful user interfaces..."></textarea>
            </div>
        </div>
    </template>

    <template id="education-form-template">
        <div class="dynamic-entry" data-type="education">
            <div class="entry-header">
                <h3>Education</h3>
                <button type="button" class="icon-btn remove-entry-btn" title="Remove"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Degree / Certificate</label>
                    <input type="text" class="edu-degree" placeholder="e.g. B.S. Computer Science">
                </div>
                <div class="form-group">
                    <label>Institution</label>
                    <input type="text" class="edu-school" placeholder="e.g. State University">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Start</label>
                    <input type="text" class="edu-start" placeholder="e.g. 2014">
                </div>
                <div class="form-group">
                    <label>End</label>
                    <input type="text" class="edu-end" placeholder="e.g. 2018">
                </div>
            </div>
            <div class="form-group">
                <label>Details</label>
                <textarea class="edu-desc" rows="2" placeholder="Relevant coursework, Honors..."></textarea>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
